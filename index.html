<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business 101 — 商業與金融基礎知識</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #1e3a5f;
      --primary-light: #2c5282;
      --accent: #ed8936;
      --accent2: #805ad5;
      --bg: #f7fafc;
      --card-bg: #fff;
      --text: #2d3748;
      --text-light: #718096;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; margin-bottom: .25rem; }
    header .subtitle { opacity: .85; font-size: 1.1rem; }
    header .back {
      display: inline-block;
      color: rgba(255,255,255,.8);
      text-decoration: none;
      margin-bottom: .75rem;
      font-size: .95rem;
      transition: color .2s;
    }
    header .back:hover { color: #fff; }

    /* Navigation tabs on home */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: .5rem;
      padding: 1.25rem 2rem 0;
      max-width: 1400px;
      margin: 0 auto;
    }
    .nav-tab {
      padding: .75rem 2rem;
      border: none;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-light);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      transition: color .2s, background .2s;
      font-family: inherit;
      position: relative;
      top: 1px;
    }
    .nav-tab.active {
      color: var(--primary);
      background: var(--bg);
      border-bottom: 2px solid var(--bg);
    }
    .nav-tab.active.cross {
      color: var(--accent2);
    }
    .nav-tab.active.roadmap {
      color: var(--accent);
    }
    .nav-tab.active.glossary {
      color: #38a169;
    }
    .nav-tab:hover:not(.active) { color: var(--primary); background: #edf2f7; }
    .nav-tab .count {
      font-size: .8rem;
      font-weight: 400;
      color: var(--text-light);
      margin-left: .35rem;
    }

    /* Home grid */
    .home { max-width: 1400px; margin: 0 auto; padding: 0 2rem 2rem; }
    .section-divider {
      border-top: 2px solid var(--border);
      padding-top: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .card h2 { font-size: 1.15rem; color: var(--primary); margin-bottom: .5rem; }
    .card p { font-size: .9rem; color: var(--text-light); line-height: 1.6; flex: 1; }
    .card .badge-row { margin-top: .75rem; display: flex; gap: .4rem; flex-wrap: wrap; }
    .badge {
      font-size: .75rem;
      padding: .15rem .55rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      color: var(--text-light);
    }

    /* Cross-topic card special styles */
    .card.cross-topic { border-left: 4px solid var(--accent2); }
    .card.cross-topic h2 { color: var(--accent2); }
    .card.cross-topic .badge.topic-badge {
      background: #f3e8ff;
      border-color: #d6bcfa;
      color: #6b46c1;
    }

    /* Reader */
    .reader { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .tabs {
      display: flex;
      gap: .25rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }
    .tab {
      padding: .6rem 1.25rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .95rem;
      color: var(--text-light);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
      font-family: inherit;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--primary-light); }

    .content-box {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      min-height: 300px;
    }
    .copy-md-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      float: right;
      margin: 0 0 .75rem .75rem;
      padding: 6px 14px;
      font-size: .82rem;
      font-family: inherit;
      color: var(--text-light);
      background: #edf2f7;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s, color .2s;
      z-index: 2;
    }
    .copy-md-btn:hover { background: var(--primary); color: #fff; }
    .copy-md-btn.copied { background: #48bb78; color: #fff; border-color: #48bb78; }
    .content-box.loading { display: flex; align-items: center; justify-content: center; color: var(--text-light); }

    .content-box iframe { width: 100%; height: 80vh; border: none; border-radius: 8px; }

    /* Markdown styles */
    .content-box h1 { font-size: 1.7rem; margin: 1.5rem 0 .75rem; color: var(--primary); }
    .content-box h1:first-of-type { clear: right; }
    .content-box h2 { font-size: 1.35rem; margin: 2rem 0 .6rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border); }
    .content-box h3 { font-size: 1.15rem; margin: 1.5rem 0 .5rem; }
    .content-box h4 { font-size: 1.05rem; margin: 1rem 0 .4rem; }
    .content-box p { margin: .6rem 0; }
    .content-box ul, .content-box ol { margin: .6rem 0; padding-left: 1.5rem; }
    .content-box li { margin: .2rem 0; }
    .content-box blockquote {
      border-left: 4px solid var(--accent);
      padding: .5rem 1rem;
      margin: 1rem 0;
      color: var(--text-light);
      background: #fffaf0;
      border-radius: 0 8px 8px 0;
    }
    .content-box code {
      background: #edf2f7;
      padding: .1rem .35rem;
      border-radius: 4px;
      font-size: .88em;
    }
    .content-box pre {
      background: #1a202c;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
    }
    .content-box pre code { background: none; padding: 0; color: inherit; font-size: .9em; }
    .content-box table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: .95rem; }
    .content-box th, .content-box td { border: 1px solid var(--border); padding: .5rem .75rem; text-align: left; }
    .content-box th { background: #edf2f7; font-weight: 600; }
    .content-box tr:nth-child(even) { background: #f7fafc; }
    .content-box strong { color: var(--primary); }
    .content-box hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .content-box a { color: var(--primary-light); text-decoration: underline; }
    .content-box a:hover { color: var(--primary); }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
      font-size: .85rem;
    }
    footer a { color: var(--primary-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Global Search */
    .search-wrapper {
      max-width: 600px;
      margin: 1.25rem auto 0;
      padding: 0 2rem;
      position: relative;
    }
    .search-input-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem 1rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input-box:focus-within {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(44,82,130,.15);
    }
    .search-input-box svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--text-light);
      margin-right: .6rem;
    }
    .search-input-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: transparent;
    }
    .search-input-box input::placeholder { color: var(--text-light); }
    .search-input-box .search-clear {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-light);
      padding: 0 .25rem;
      display: none;
      line-height: 1;
    }
    .search-input-box .search-clear:hover { color: var(--text); }
    .search-input-box .index-status {
      flex-shrink: 0;
      font-size: .72rem;
      color: var(--text-light);
      white-space: nowrap;
      margin-left: .35rem;
      transition: opacity .5s;
    }
    .search-results-dropdown {
      position: absolute;
      top: 100%;
      left: 2rem;
      right: 2rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow-lg);
      max-height: 420px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-results-dropdown.visible { display: block; }
    .search-result-item {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .75rem 1rem;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      cursor: pointer;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #edf2f7; }
    .search-result-item .result-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }
    .search-result-item .result-icon.topic-icon { background: var(--primary-light); }
    .search-result-item .result-icon.cross-icon { background: var(--accent2); }
    .search-result-item .result-icon.glossary-icon { background: #38a169; }
    .search-result-item .result-info { flex: 1; min-width: 0; }
    .search-result-item .result-title {
      font-weight: 600;
      font-size: .95rem;
      margin-bottom: .15rem;
    }
    .search-result-item .result-title mark {
      background: #fefcbf;
      color: var(--text);
      border-radius: 2px;
      padding: 0 1px;
    }
    .search-result-item .result-desc {
      font-size: .82rem;
      color: var(--text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-result-item .result-desc mark {
      background: #fefcbf;
      color: var(--text-light);
      border-radius: 2px;
      padding: 0 1px;
    }
    .search-result-item .result-badges {
      display: flex;
      gap: .3rem;
      margin-top: .35rem;
      flex-wrap: wrap;
    }
    .search-result-item .result-badges .badge { font-size: .7rem; }
    .search-result-item .result-badges .badge.content-badge {
      background: #ebf8ff;
      border-color: #90cdf4;
      color: #2b6cb0;
    }
    .search-result-item .result-desc.result-snippet {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }
    .search-result-item .result-badges .badge.glossary-badge {
      background: #f0fff4;
      border-color: #9ae6b4;
      color: #276749;
    }
    .search-no-result {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-light);
      font-size: .95rem;
    }
    .search-hint {
      padding: .5rem 1rem;
      text-align: right;
      color: var(--text-light);
      font-size: .78rem;
      border-top: 1px solid var(--border);
    }

    /* Error */
    .error { text-align: center; color: #e53e3e; padding: 2rem; }

    /* Responsive - tablet */
    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Responsive - mobile */
    @media (max-width: 640px) {
      header { padding: 1.5rem 1rem; }
      header h1 { font-size: 1.35rem; }
      header .subtitle { font-size: .95rem; }
      .nav-tabs { padding: .75rem .75rem 0; gap: .25rem; }
      .nav-tab { padding: .6rem 1rem; font-size: .95rem; }
      .home { padding: .75rem .75rem .75rem; }
      .grid { grid-template-columns: 1fr; gap: .75rem; }
      .card { padding: 1.15rem; }
      .card h2 { font-size: 1.05rem; }
      .reader { padding: .75rem; }
      .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; gap: 0; touch-action: pan-x; overscroll-behavior-x: contain; }
      .tab { padding: .5rem .9rem; font-size: .88rem; flex-shrink: 0; }
      .content-box { padding: 1rem; border-radius: 8px; }
      .content-box h1 { font-size: 1.35rem; }
      .content-box h2 { font-size: 1.15rem; }
      .content-box h3 { font-size: 1.05rem; }
      .content-box table { font-size: .85rem; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .content-box pre { font-size: .82rem; padding: .75rem; }
      .content-box iframe { height: 60vh; }
      .content-box blockquote { padding: .4rem .75rem; }
      footer { padding: 1.25rem; }
      .search-wrapper { padding: 0 .75rem; margin-top: .75rem; }
      .search-results-dropdown { left: .75rem; right: .75rem; max-height: 320px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    let topicSections = [];
    let crossSections = [];
    let glossaryEntries = []; // { term, english, definition, category }
    let contentIndex = [];    // { topicTitle, linkText, linkType, url, content, isCross }
    let indexReady = false;
    let currentTabIdx = 0;
    let activeHomeTab = 'roadmap'; // 'roadmap', 'topics', 'cross', or 'glossary'

    marked.setOptions({ breaks: true, gfm: true });

    /* ---- Copy Markdown Button helper ---- */
    function createCopyMdBtn(rawMarkdown) {
      const btn = document.createElement('button');
      btn.className = 'copy-md-btn';
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製 Markdown';
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(rawMarkdown);
          btn.classList.add('copied');
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>已複製！';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製 Markdown';
          }, 2000);
        } catch (e) {
          btn.textContent = '複製失敗';
        }
      });
      return btn;
    }

    /* ---- Parse README.md into two groups ---- */
    function parseReadme(md) {
      const topics = [];
      const cross = [];
      let cur = null;
      let inCross = false;

      for (const line of md.split('\n')) {
        // Detect ## level headers to switch between sections
        const h2 = line.match(/^##\s+(.+)/);
        if (h2) {
          const title = h2[1].trim();
          if (title === '跨主題整合分析') { inCross = true; cur = null; continue; }
          if (title === '各主題分析') { inCross = false; cur = null; continue; }
          // skip other ## headers like 本地預覽
          cur = null;
          continue;
        }

        const hdr = line.match(/^###\s+(.+)/);
        if (hdr) {
          cur = { title: hdr[1].trim(), links: [], isCross: inCross };
          if (inCross) cross.push(cur);
          else topics.push(cur);
          continue;
        }
        if (!cur) continue;

        const lnk = line.match(/^-\s+\[(.+?)\]\((.+?)\)\s*[—–\-]\s*(.+)/);
        if (lnk) {
          const [, text, url, desc] = lnk;
          let type = 'professional';
          if (text.includes('白話') || url.includes('白話')) type = 'plain';
          if (url.endsWith('.html')) type = 'interactive';
          if (text.includes('案例') || url.includes('案例')) type = 'casestudy';
          if (text.includes('練習') || url.includes('練習')) type = 'quiz';
          if (text.includes('進一步學習') || url.includes('進一步學習')) type = 'further';
          if (inCross) type = 'cross';
          cur.links.push({ text: text.trim(), url: url.trim(), description: desc.trim(), type });
        }
      }
      return { topics, cross };
    }

    /* ---- Parse glossary markdown into entries ---- */
    function parseGlossary(md) {
      const entries = [];
      let currentCategory = '';
      for (const line of md.split('\n')) {
        const h2 = line.match(/^##\s+(.+)/);
        if (h2) { currentCategory = h2[1].trim(); continue; }
        // Match table rows: | 術語 | English | 定義 |
        const row = line.match(/^\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|$/);
        if (row) {
          const [, term, english, definition] = row;
          // Skip header row
          if (term === '術語' || term.match(/^-+$/)) continue;
          if (english.match(/^-+$/)) continue;
          entries.push({
            term: term.trim(),
            english: english.trim(),
            definition: definition.trim(),
            category: currentCategory
          });
        }
      }
      return entries;
    }

    /* ---- Search bar HTML snippet ---- */
    function searchBarHTML() {
      return `<div class="search-wrapper" id="search-wrapper">
        <div class="search-input-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="搜尋主題、術語、關鍵字…" autocomplete="off" />
          <button class="search-clear" id="search-clear" title="清除">&times;</button>
          <span id="index-status" class="index-status">${indexReady ? '' : '索引中…'}</span>
        </div>
        <div class="search-results-dropdown" id="search-dropdown"></div>
      </div>`;
    }

    /* ---- Highlight matching text ---- */
    function highlightMatch(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escaped})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }

    /* ---- Extract a text snippet around the match ---- */
    function extractSnippet(content, query, maxLen = 100) {
      // Strip markdown syntax for cleaner snippets
      const plain = content
        .replace(/^#{1,6}\s+/gm, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/[*_~`>|]/g, '')
        .replace(/\n{2,}/g, '\n')
        .replace(/---+/g, '');
      const idx = plain.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return '';
      const start = Math.max(0, idx - 30);
      const end = Math.min(plain.length, idx + query.length + maxLen - 30);
      let snippet = plain.slice(start, end).replace(/\n/g, ' ').trim();
      if (start > 0) snippet = '…' + snippet;
      if (end < plain.length) snippet += '…';
      return snippet;
    }

    /* ---- Perform search across all topics, glossary, and full-text content ---- */
    function performSearch(query) {
      if (!query || query.trim().length === 0) return [];
      const q = query.trim().toLowerCase();
      const results = [];
      const seenTopics = new Set(); // track topics already added to avoid duplicates

      // 1. Search topics & cross-topics (title + description)
      const allTopics = [
        ...topicSections.map(t => ({ ...t, isCross: false })),
        ...crossSections.map(t => ({ ...t, isCross: true }))
      ];

      for (const topic of allTopics) {
        const titleMatch = topic.title.toLowerCase().includes(q);
        const descMatches = [];
        const badgeLabels = [];

        for (const link of topic.links) {
          const desc = stripMdLinks(link.description || '');
          if (desc.toLowerCase().includes(q)) {
            descMatches.push(desc);
          }
          badgeLabels.push(tabLabel(link));
          if (link.text.toLowerCase().includes(q) && !titleMatch) {
            descMatches.push(link.text);
          }
        }

        if (titleMatch || descMatches.length > 0) {
          const pro = topic.links.find(l => l.type === 'professional' || l.type === 'cross');
          const rawDesc = pro ? stripMdLinks(pro.description.replace(/^專業版[，,]\s*/, '')) : stripMdLinks(topic.links[0]?.description || '');
          results.push({
            resultType: 'topic',
            title: topic.title,
            description: rawDesc,
            isCross: topic.isCross,
            badges: badgeLabels,
            titleMatch,
            descMatch: descMatches.length > 0 ? descMatches[0] : null
          });
          seenTopics.add(topic.title);
        }
      }

      // 2. Search glossary entries
      for (const entry of glossaryEntries) {
        const termMatch = entry.term.toLowerCase().includes(q);
        const englishMatch = entry.english.toLowerCase().includes(q);
        const defMatch = entry.definition.toLowerCase().includes(q);
        const catMatch = entry.category.toLowerCase().includes(q);

        if (termMatch || englishMatch || defMatch || catMatch) {
          results.push({
            resultType: 'glossary',
            title: entry.term,
            english: entry.english,
            description: entry.definition,
            category: entry.category,
            titleMatch: termMatch || englishMatch
          });
        }
      }

      // 3. Search full-text content index
      if (indexReady || contentIndex.length > 0) {
        for (const item of contentIndex) {
          if (!item.content.toLowerCase().includes(q)) continue;

          // If the parent topic is already in results, add content match info
          const existingTopic = results.find(r => r.resultType === 'topic' && r.title === item.topicTitle);
          if (existingTopic) {
            // Enrich existing topic result with content snippet if it doesn't have one
            if (!existingTopic.contentSnippet) {
              existingTopic.contentSnippet = extractSnippet(item.content, q);
              existingTopic.contentMatchType = item.linkType;
            }
            continue;
          }

          // Check if we already added a content result for this topic
          const key = item.topicTitle + '::' + item.linkType;
          if (seenTopics.has(item.topicTitle)) continue;

          const snippet = extractSnippet(item.content, q);
          results.push({
            resultType: 'content',
            title: item.topicTitle,
            linkText: item.linkText,
            linkType: item.linkType,
            url: item.url,
            isCross: item.isCross,
            snippet,
            titleMatch: false
          });
          seenTopics.add(item.topicTitle);
        }
      }

      // Sort priority: topic title match > glossary term match > topic desc match > content match
      results.sort((a, b) => {
        const order = { topic: 0, glossary: 1, content: 2 };
        // Title/term matches first within each type
        if (a.titleMatch && !b.titleMatch) return -1;
        if (!a.titleMatch && b.titleMatch) return 1;
        // Then by type
        const ao = order[a.resultType] ?? 3;
        const bo = order[b.resultType] ?? 3;
        if (ao !== bo) return ao - bo;
        return a.title.length - b.title.length;
      });

      return results;
    }

    /* ---- Render search results dropdown ---- */
    function renderSearchResults(results, query) {
      const dropdown = document.getElementById('search-dropdown');
      if (!dropdown) return;

      if (results.length === 0) {
        const indexMsg = indexReady ? '' : '<br><span style="font-size:.82rem">（全文索引建立中，稍後可搜尋更多內容）</span>';
        dropdown.innerHTML = `<div class="search-no-result">找不到「${query}」相關的結果${indexMsg}</div>`;
        dropdown.classList.add('visible');
        return;
      }

      const items = results.map(r => {
        if (r.resultType === 'glossary') {
          const title = highlightMatch(r.title, query);
          const english = highlightMatch(r.english, query);
          const desc = highlightMatch(r.description, query);
          return `<a class="search-result-item" href="#" data-glossary-term="${r.title}">
            <div class="result-icon glossary-icon">詞</div>
            <div class="result-info">
              <div class="result-title">${title} <span style="font-weight:400;color:var(--text-light);font-size:.85rem">${english}</span></div>
              <div class="result-desc">${desc}</div>
              <div class="result-badges"><span class="badge glossary-badge">${r.category}</span></div>
            </div>
          </a>`;
        }
        if (r.resultType === 'content') {
          // Full-text content match (topic not matched by title/desc)
          const iconClass = r.isCross ? 'cross-icon' : 'topic-icon';
          const iconText = r.isCross ? '跨' : '文';
          const title = highlightMatch(r.title, query);
          const snippet = highlightMatch(r.snippet, query);
          const typeLabel = tabLabel({ type: r.linkType });
          return `<a class="search-result-item" href="#${encodeURIComponent(r.title)}">
            <div class="result-icon ${iconClass}">${iconText}</div>
            <div class="result-info">
              <div class="result-title">${title}</div>
              <div class="result-desc result-snippet">${snippet}</div>
              <div class="result-badges"><span class="badge content-badge">${typeLabel}內文匹配</span></div>
            </div>
          </a>`;
        }
        // Topic or cross-topic result (title/desc match)
        const iconClass = r.isCross ? 'cross-icon' : 'topic-icon';
        const iconText = r.isCross ? '跨' : '題';
        const title = highlightMatch(r.title, query);
        const desc = highlightMatch(r.contentSnippet || r.description, query);
        const badges = r.badges ? r.badges.map(b => `<span class="badge">${b}</span>`).join('') : '';
        const snippetExtra = r.contentSnippet ? `<div class="result-badges"><span class="badge content-badge">${tabLabel({ type: r.contentMatchType })}內文匹配</span></div>` : '';
        return `<a class="search-result-item" href="#${encodeURIComponent(r.title)}">
          <div class="result-icon ${iconClass}">${iconText}</div>
          <div class="result-info">
            <div class="result-title">${title}</div>
            <div class="result-desc">${desc}</div>
            <div class="result-badges">${badges}</div>
            ${snippetExtra}
          </div>
        </a>`;
      }).join('');

      dropdown.innerHTML = items + `<div class="search-hint">共 ${results.length} 筆結果，點擊前往</div>`;
      dropdown.classList.add('visible');
    }

    /* ---- Bind search events ---- */
    function bindSearchEvents() {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('search-clear');
      const dropdown = document.getElementById('search-dropdown');
      if (!input) return;

      let debounceTimer;
      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const val = input.value;
        clearBtn.style.display = val.length > 0 ? 'block' : 'none';
        debounceTimer = setTimeout(() => {
          if (val.trim().length === 0) {
            dropdown.classList.remove('visible');
            return;
          }
          const results = performSearch(val);
          renderSearchResults(results, val.trim());
        }, 200);
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.style.display = 'none';
        dropdown.classList.remove('visible');
        input.focus();
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        const wrapper = document.getElementById('search-wrapper');
        if (wrapper && !wrapper.contains(e.target)) {
          dropdown.classList.remove('visible');
        }
      });

      // Close dropdown on Escape
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          dropdown.classList.remove('visible');
          input.blur();
        }
      });

      // Navigate on clicking result
      dropdown.addEventListener('click', (e) => {
        const item = e.target.closest('.search-result-item');
        if (!item) return;

        dropdown.classList.remove('visible');
        input.value = '';
        clearBtn.style.display = 'none';

        // Handle glossary term click: switch to glossary tab and scroll to term
        const glossaryTerm = item.dataset.glossaryTerm;
        if (glossaryTerm) {
          e.preventDefault();
          location.hash = '';
          activeHomeTab = 'glossary';
          renderHome();
          // Wait for glossary to load, then scroll to the matching term
          const waitForGlossary = setInterval(() => {
            const glossaryBox = document.getElementById('glossary-content');
            if (!glossaryBox || glossaryBox.classList.contains('loading')) return;
            clearInterval(waitForGlossary);
            // Find the term in rendered table cells
            const cells = glossaryBox.querySelectorAll('td');
            for (const cell of cells) {
              if (cell.textContent.trim() === glossaryTerm) {
                const row = cell.closest('tr');
                if (row) {
                  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                  row.style.transition = 'background .3s';
                  row.style.background = '#fefcbf';
                  setTimeout(() => { row.style.background = ''; }, 2500);
                }
                break;
              }
            }
          }, 100);
        }
      });
    }

    /* ---- Convert internal .md links to SPA hash navigation ---- */
    function convertInternalLinks(container) {
      const allTopics = [...topicSections, ...crossSections];
      container.querySelectorAll('a[href]').forEach(a => {
        const href = decodeURIComponent(a.getAttribute('href'));
        // Match links like ../主題名/檔名.md or ./主題名/檔名.md
        const mdMatch = href.match(/\.\.?\/([^/]+)\/[^/]+\.md$/);
        if (mdMatch) {
          const dirName = mdMatch[1];
          const topic = allTopics.find(t => t.title === dirName);
          if (topic) {
            a.href = '#' + encodeURIComponent(topic.title);
            a.style.color = 'var(--primary-light)';
            a.style.textDecoration = 'underline';
          }
        }
      });
    }

    /* ---- Strip markdown link syntax from text: [text](url) → text ---- */
    function stripMdLinks(str) {
      return str.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
    }

    /* ---- Tab label ---- */
    function tabLabel(link) {
      if (link.type === 'plain') return '白話版';
      if (link.type === 'interactive') return '互動圖表';
      if (link.type === 'casestudy') return '案例分析';
      if (link.type === 'quiz') return '練習與自測';
      if (link.type === 'further') return '進一步學習';
      if (link.type === 'cross') return '整合分析';
      return '專業版';
    }

    /* ---- Extract cross-topic tags from description ---- */
    function extractTopicTags(desc) {
      const match = desc.match(/橫跨(.+)/);
      if (!match) return [];
      return match[1].split(/[、，,]/).map(s => s.replace(/[大主題\d一二三四五六七八九十]/g, '').trim()).filter(Boolean);
    }

    /* ---- Render home ---- */
    function renderHome() {
      currentTabIdx = 0;

      const topicCards = topicSections.map(t => {
        const pro = t.links.find(l => l.type === 'professional');
        const rawDesc = pro ? pro.description.replace(/^專業版[，,]\s*/, '') : t.links[0]?.description || '';
        const desc = stripMdLinks(rawDesc);
        const badges = t.links.map(l => `<span class="badge">${tabLabel(l)}</span>`).join('');
        return `<a class="card" href="#${encodeURIComponent(t.title)}">
          <h2>${t.title}</h2>
          <p>${desc}</p>
          <div class="badge-row">${badges}</div>
        </a>`;
      }).join('');

      const crossCards = crossSections.map(t => {
        const link = t.links[0];
        const desc = stripMdLinks(link?.description || '');
        const tags = extractTopicTags(desc);
        const tagBadges = tags.map(tag => `<span class="badge topic-badge">${tag}</span>`).join('');
        return `<a class="card cross-topic" href="#${encodeURIComponent(t.title)}">
          <h2>${t.title}</h2>
          <p>${desc}</p>
          <div class="badge-row">${tagBadges}</div>
        </a>`;
      }).join('');

      const isTopics = activeHomeTab === 'topics';
      const isRoadmap = activeHomeTab === 'roadmap';

      const isGlossary = activeHomeTab === 'glossary';

      let mainContent;
      if (isRoadmap) {
        mainContent = `<main class="reader section-divider"><div class="content-box loading" id="roadmap-content">載入中…</div></main>`;
      } else if (isGlossary) {
        mainContent = `<main class="reader section-divider"><div class="content-box loading" id="glossary-content">載入中…</div></main>`;
      } else {
        mainContent = `<main class="home section-divider"><div class="grid">${isTopics ? topicCards : crossCards}</div></main>`;
      }

      document.getElementById('app').innerHTML = `
        <header>
          <h1>Business 101</h1>
          <p class="subtitle">商業與金融基礎知識學習筆記</p>
          ${searchBarHTML()}
        </header>
        <div class="nav-tabs">
          <button class="nav-tab${isRoadmap ? ' active roadmap' : ' roadmap'}" data-tab="roadmap">
            學習路線圖
          </button>
          <button class="nav-tab${isTopics ? ' active' : ''}" data-tab="topics">
            各主題分析<span class="count">${topicSections.length}</span>
          </button>
          <button class="nav-tab${activeHomeTab === 'cross' ? ' active cross' : ' cross'}" data-tab="cross">
            跨主題整合分析<span class="count">${crossSections.length}</span>
          </button>
          <button class="nav-tab${activeHomeTab === 'glossary' ? ' active glossary' : ' glossary'}" data-tab="glossary">
            術語總表
          </button>
        </div>
        ${mainContent}
        <footer>
          <a href="https://github.com/cyyeh/business-101" target="_blank" rel="noopener"><svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>
        </footer>`;

      document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeHomeTab = btn.dataset.tab;
          renderHome();
        });
      });

      bindSearchEvents();

      // Load roadmap markdown if on roadmap tab
      if (isRoadmap) {
        loadRoadmap();
      }
      // Load glossary markdown if on glossary tab
      if (isGlossary) {
        loadGlossary();
      }
    }

    /* ---- Load roadmap content ---- */
    async function loadRoadmap() {
      const el = document.getElementById('roadmap-content');
      if (!el) return;
      try {
        const res = await fetch(encodeURI('學習路線圖.md'));
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();
        el.className = 'content-box';
        el.innerHTML = marked.parse(md);
        el.prepend(createCopyMdBtn(md));
        // Make topic links in roadmap clickable
        el.querySelectorAll('strong').forEach(strong => {
          const text = strong.textContent.trim();
          const allTopics = [...topicSections, ...crossSections];
          const topic = allTopics.find(t => t.title === text);
          if (topic) {
            const link = document.createElement('a');
            link.href = '#' + encodeURIComponent(topic.title);
            link.textContent = text;
            link.style.color = 'var(--primary-light)';
            link.style.textDecoration = 'underline';
            link.style.fontWeight = '600';
            strong.replaceWith(link);
          }
        });
      } catch (e) {
        el.className = 'content-box error';
        el.textContent = '載入失敗，請重新整理頁面。';
      }
    }

    /* ---- Load glossary content ---- */
    async function loadGlossary() {
      const el = document.getElementById('glossary-content');
      if (!el) return;
      try {
        const res = await fetch(encodeURI('術語總表.md'));
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();
        el.className = 'content-box';
        el.innerHTML = marked.parse(md);
        el.prepend(createCopyMdBtn(md));
        convertInternalLinks(el);
      } catch (e) {
        el.className = 'content-box error';
        el.textContent = '載入失敗，請重新整理頁面。';
      }
    }

    /* ---- Render topic (with tabs) ---- */
    async function renderTopic(topic) {
      if (currentTabIdx >= topic.links.length) currentTabIdx = 0;

      const tabs = topic.links.map((l, i) =>
        `<button class="tab${i === currentTabIdx ? ' active' : ''}" data-idx="${i}">${tabLabel(l)}</button>`
      ).join('');

      const backLabel = topic.isCross ? '← 返回跨主題整合分析' : '← 返回各主題分析';

      document.getElementById('app').innerHTML = `
        <header>
          <a class="back" href="#" data-back="${topic.isCross ? 'cross' : 'topics'}">${backLabel}</a>
          <h1>${topic.title}</h1>
          ${searchBarHTML()}
        </header>
        <main class="reader">
          ${topic.links.length > 1 ? `<div class="tabs">${tabs}</div>` : ''}
          <div class="content-box loading" id="md-content">載入中…</div>
        </main>
        <footer>
          <a href="https://github.com/cyyeh/business-101" target="_blank" rel="noopener"><svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>
        </footer>`;

      document.querySelector('.back').addEventListener('click', (e) => {
        e.preventDefault();
        activeHomeTab = e.target.dataset.back || 'topics';
        location.hash = '';
      });

      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTabIdx = parseInt(btn.dataset.idx);
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadContent(topic.links[currentTabIdx]);
        });
      });

      bindSearchEvents();

      await loadContent(topic.links[currentTabIdx]);
    }

    /* ---- Load markdown or iframe ---- */
    async function loadContent(link) {
      const el = document.getElementById('md-content');
      el.className = 'content-box loading';
      el.textContent = '載入中…';

      if (link.type === 'interactive') {
        el.className = 'content-box';
        el.innerHTML = `<iframe src="${encodeURI(link.url)}"></iframe>`;
        return;
      }

      try {
        const res = await fetch(encodeURI(link.url));
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();
        el.className = 'content-box';
        el.innerHTML = marked.parse(md);
        convertInternalLinks(el);
        el.prepend(createCopyMdBtn(md));
      } catch (e) {
        el.className = 'content-box error';
        el.textContent = '載入失敗，請重新整理頁面。';
      }
    }

    /* ---- Router ---- */
    function route() {
      const hash = decodeURIComponent(location.hash.slice(1));
      if (!hash) { renderHome(); return; }

      const allTopics = [...topicSections, ...crossSections];
      const topic = allTopics.find(t => t.title === hash);
      if (topic) {
        currentTabIdx = 0;
        renderTopic(topic);
      } else {
        renderHome();
      }
    }

    /* ---- Build full-text index in background ---- */
    async function buildContentIndex() {
      const allTopics = [
        ...topicSections.map(t => ({ ...t, isCross: false })),
        ...crossSections.map(t => ({ ...t, isCross: true }))
      ];

      // Collect all markdown links (skip .html interactive files)
      const tasks = [];
      for (const topic of allTopics) {
        for (const link of topic.links) {
          if (link.url.endsWith('.html')) continue;
          tasks.push({ topicTitle: topic.title, link, isCross: topic.isCross });
        }
      }

      // Fetch in batches of 10 to avoid overwhelming the server
      const batchSize = 10;
      for (let i = 0; i < tasks.length; i += batchSize) {
        const batch = tasks.slice(i, i + batchSize);
        const results = await Promise.allSettled(
          batch.map(async (task) => {
            const res = await fetch(encodeURI(task.link.url));
            if (!res.ok) return null;
            const text = await res.text();
            return {
              topicTitle: task.topicTitle,
              linkText: task.link.text,
              linkType: task.link.type,
              url: task.link.url,
              isCross: task.isCross,
              content: text
            };
          })
        );
        for (const r of results) {
          if (r.status === 'fulfilled' && r.value) {
            contentIndex.push(r.value);
          }
        }
        // Update indexing status indicator
        updateIndexStatus(Math.min(i + batchSize, tasks.length), tasks.length);
      }

      indexReady = true;
      updateIndexStatus(tasks.length, tasks.length);
    }

    /* ---- Update index status indicator ---- */
    function updateIndexStatus(done, total) {
      const el = document.getElementById('index-status');
      if (!el) return;
      if (done >= total) {
        el.textContent = '全文索引就緒';
        el.style.color = '#38a169';
        setTimeout(() => { el.style.opacity = '0'; }, 1500);
      } else {
        el.textContent = `建立索引中 ${done}/${total}`;
      }
    }

    /* ---- Init ---- */
    async function init() {
      try {
        const [readmeRes, glossaryRes] = await Promise.all([
          fetch('README.md'),
          fetch(encodeURI('術語總表.md'))
        ]);
        const md = await readmeRes.text();
        const parsed = parseReadme(md);
        topicSections = parsed.topics;
        crossSections = parsed.cross;

        if (glossaryRes.ok) {
          const glossaryMd = await glossaryRes.text();
          glossaryEntries = parseGlossary(glossaryMd);
        }

        window.addEventListener('hashchange', route);
        route();

        // Start background indexing after page is rendered
        buildContentIndex();
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="error" style="padding:4rem">無法載入內容，請確認 README.md 存在。</div>';
      }
    }

    init();
  </script>
